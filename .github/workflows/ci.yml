name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run test:links

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:e2e

  # Optional — runs only when GSC_SERVICE_ACCOUNT_JSON is configured in repo secrets.
  # Settings → Secrets and variables → Actions → New repository secret
  gsc:
    needs: build-and-test
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.GSC_SERVICE_ACCOUNT_JSON != ''
    runs-on: ubuntu-latest
    env:
      GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify GSC API access
        run: npm run gsc:test

      - name: Submit sitemap to Google Search Console
        run: npm run gsc:sitemap

      - name: Export GSC analytics snapshot
        run: npm run gsc:export -- --out gsc-export.json

      - name: Upload GSC export artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsc-export
          path: gsc-export.json
          retention-days: 30
          if-no-files-found: error
